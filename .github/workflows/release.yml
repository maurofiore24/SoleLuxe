name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          
      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "Gradle wrapper not found. Generating with version 9.3.1..."
            gradle wrapper --gradle-version 9.3.1
          fi
          
      - name: Make gradlew executable
        run: chmod +x ./gradlew
        
      - name: Generate release keystore
        run: |
          keytool -genkey -v -keystore app/my_upload_key.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias upload \
            -storepass soleluxe123 \
            -keypass soleluxe123 \
            -dname "CN=SoleLuxe, OU=Development, O=SoleLuxe, L=Global, ST=Global, C=US"
          echo "✅ Keystore generated at app/my_upload_key.jks"
        
      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/my_upload_key.jks
          STORE_PASSWORD: soleluxe123
          KEY_PASSWORD: soleluxe123
        
      - name: Extract version from tag
        id: tag_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
      - name: Find APK file
        id: find_apk
        run: |
          APK_PATH=$(find . -name "app-release.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: app-release.apk not found"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          ls -lh "$APK_PATH"
          
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.find_apk.outputs.apk_path }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Output Download URL
        run: |
          echo "✅ Release published successfully!"
          echo "Download URL: https://github.com/maurofiore24/SoleLuxe/releases/latest/download/app-release.apk"
